services:
  db:
    image: postgres:16
    environment: # tasks:tasks@localhost:5432/tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: tasks 
    ports:
      - "5432:5432" # vänstra sidan = port på min dator, högra sidan = port i container
    volumes:
      - postgres_data:/var/lib/postgresql/postgres_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: