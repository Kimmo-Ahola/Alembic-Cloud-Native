services:
  db:
    image: postgres:16
    environment: # tasks:tasks@localhost:5432/tasks_test
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: tasks_test 
    ports:
      - "5433:5432" # vänstra sidan = port på min dator, högra sidan = port i container
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks"]
      interval: 5s
      timeout: 5s
      retries: 5